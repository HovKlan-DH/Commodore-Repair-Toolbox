name: Build and Release - PoC (All Platforms)

on:
  push:
    tags:
      - 'poc-*'   # Only triggers on tags like poc-1.0, poc-1.1 etc.

jobs:

  ###############################################################
  # WINDOWS BUILD
  ###############################################################
  build-windows:
    name: Build - Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows
        run: |
          dotnet publish PoC/PoC_1/PoC_1.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -o publish/windows

      - name: Zip Windows build
        run: |
          Compress-Archive -Path publish/windows/* `
            -DestinationPath CommodoreRepairToolbox-${{ github.ref_name }}-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: CommodoreRepairToolbox-*-windows-x64.zip

  ###############################################################
  # LINUX BUILD
  ###############################################################
  build-linux:
    name: Build - Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Linux
        run: |
          dotnet publish PoC/PoC_1/PoC_1.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -o publish/linux

      - name: Zip Linux build
        run: |
          cd publish/linux
          zip -r ../../CommodoreRepairToolbox-${{ github.ref_name }}-linux-x64.zip .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: CommodoreRepairToolbox-*-linux-x64.zip

  ###############################################################
  # MACOS BUILD
  ###############################################################
  build-macos:
    name: Build - macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish macOS (Intel)
        run: |
          dotnet publish PoC/PoC_1/PoC_1.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -o publish/macos-x64

      - name: Publish macOS (Apple Silicon)
        run: |
          dotnet publish PoC/PoC_1/PoC_1.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained \
            -p:PublishSingleFile=true \
            -o publish/macos-arm64

      - name: Zip macOS builds
        run: |
          cd publish/macos-x64
          zip -r ../../CommodoreRepairToolbox-${{ github.ref_name }}-macos-x64.zip .
          cd ../macos-arm64
          zip -r ../../CommodoreRepairToolbox-${{ github.ref_name }}-macos-arm64.zip .

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: CommodoreRepairToolbox-*-macos-*.zip

  ###############################################################
  # CREATE GITHUB RELEASE
  ###############################################################
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PoC - Commodore Repair Toolbox ${{ github.ref_name }}"
          body: |
            ## ⚠️ This is a PoC (Proof of Concept) build — NOT a production release!

            This is an experimental Avalonia UI cross-platform build for testing purposes only.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `*-windows-x64.zip` |
            | 🐧 Linux | `*-linux-x64.zip` |
            | 🍎 macOS (Intel) | `*-macos-x64.zip` |
            | 🍎 macOS (Apple Silicon) | `*-macos-arm64.zip` |

            ### Notes
            - Windows: Extract the zip and run `PoC_1.exe`
            - Linux: Extract, `chmod +x PoC_1` and run `./PoC_1`
            - macOS: Extract and run `./PoC_1` (right-click → Open on first launch)
          draft: false
          prerelease: true
          files: release-assets/*
          
